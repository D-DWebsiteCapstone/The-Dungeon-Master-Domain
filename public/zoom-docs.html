<h1>Zoom Integration Guide</h1>

<h2>How to Connect Zoom</h2>
<ol>
  <li>Log into your DM account</li>
  <li>Click "Connect Zoom"</li>
  <li>Authorize Zoom access</li>
</ol>

<h2>How to Create a Meeting</h2>
<ol>
  <li>Schedule a campaign session</li>
  <li>Click "Create Zoom Meeting"</li>
</ol>

<h2>How to Remove Zoom</h2>
<p>You can revoke access through your Zoom account settings.</p>
